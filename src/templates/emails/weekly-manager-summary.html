<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><title>Résumé semaine — {{app_name}}</title></head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
  <tr><td align="center">
    <table width="640" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">
      <tr><td style="background:#2563eb;padding:32px 40px;text-align:center;">
        <h1 style="margin:0;color:#fff;font-size:24px;">{{app_name}}</h1>
        <p style="margin:8px 0 0;color:#bfdbfe;font-size:14px;">Résumé de la semaine du {{periode}}</p>
      </td></tr>
      <tr><td style="padding:40px;">
        <p style="color:#374151;">Bonjour <strong>{{prenom}}</strong>,</p>
        <p style="color:#374151;">Voici les <strong>{{total}} congé(s)</strong> validé(s) pour votre équipe cette semaine.</p>
        <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin:24px 0;">
          <thead>
            <tr style="background:#f9fafb;">
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#6b7280;border-bottom:2px solid #e5e7eb;">Collaborateur</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#6b7280;border-bottom:2px solid #e5e7eb;">Service</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#6b7280;border-bottom:2px solid #e5e7eb;">Type</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#6b7280;border-bottom:2px solid #e5e7eb;">Début</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#6b7280;border-bottom:2px solid #e5e7eb;">Fin</th>
            </tr>
          </thead>
          <tbody>{{table_rows}}</tbody>
        </table>
        <table cellpadding="0" cellspacing="0" style="margin:24px 0;">
          <tr><td style="background:#2563eb;border-radius:6px;">
            <a href="{{dashboard_url}}" style="display:inline-block;padding:12px 24px;color:#fff;font-size:14px;font-weight:600;text-decoration:none;">Voir tous les congés</a>
          </td></tr>
        </table>
        <hr style="border:none;border-top:1px solid #e5e7eb;margin:32px 0;"/>
        <p style="color:#9ca3af;font-size:12px;text-align:center;">© {{year}} {{signature}}</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
