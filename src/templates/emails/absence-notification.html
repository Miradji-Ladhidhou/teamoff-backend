<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body { font-family: Arial; line-height: 1.6; color: #333; margin:0;padding:0; }
      .container { max-width:600px;margin:0 auto;padding:20px; }
      .header { background:#4f46e5;color:white;padding:30px;text-align:center;border-radius:10px 10px 0 0; }
      .content { background:#fff;padding:30px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 10px 10px; }
      .footer { text-align:center;padding:20px;color:#666;font-size:12px;margin-top:20px; }
      .button { background:#4f46e5;color:white;padding:12px 30px;text-decoration:none;border-radius:5px;display:inline-block;margin:20px 0; }
      .info-table { width:100%;border-collapse:collapse;margin:18px 0; }
      .info-table th, .info-table td { border:1px solid #e5e7eb;padding:8px 12px;text-align:left; }
      .info-table th { background:#f1f5f9; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header"><h1>{{app_name}}</h1></div>
      <div class="content">
        <h2 style="color:#4f46e5;margin-top:0">Nouvelle absence enregistrée</h2>
        <table class="info-table">
          <tr><th>Employé</th><td>{{prenom}} {{nom}}</td></tr>
          <tr><th>Email</th><td>{{employe_email}}</td></tr>
          <tr><th>Type d'absence</th><td>{{type_absence}}</td></tr>
          <tr><th>Début</th><td>{{date_debut}}</td></tr>
          <tr><th>Fin</th><td>{{date_fin}}</td></tr>
          <tr><th>Commentaire</th><td>{{commentaire}}</td></tr>
        </table>
        <p style="margin-top:18px;">Cette absence a été enregistrée dans le planning de l'entreprise.</p>
      </div>
      <div class="footer">© {{year}} {{app_name}}. Email automatique.</div>
    </div>
  </body>
</html>
